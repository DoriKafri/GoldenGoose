// ═══════════════════════════════════════════
// NODES — Force-directed layout
// ═══════════════════════════════════════════
class Node {
  constructor(name, label, color, x, y, radius, type) {
    this.name = name; this.label = label; this.color = color;
    this.x = x; this.y = y; this.tx = x; this.ty = y;
    this.radius = radius; this.type = type;
    this.glow = 0; this.pulse = 0;
    this.vx = 0; this.vy = 0;
  }
  activate(intensity = 1) {
    this.glow = Math.min(1, this.glow + intensity);
    this.pulse = 1;
  }
  update() {
    this.glow *= 0.97;
    this.pulse *= 0.94;
    this.x += (this.tx - this.x) * 0.03;
    this.y += (this.ty - this.y) * 0.03;
  }
  draw(ctx) {
    const r = this.radius;
    // Glow
    if (this.glow > 0.01) {
      const grad = ctx.createRadialGradient(this.x, this.y, r, this.x, this.y, r * 4);
      grad.addColorStop(0, this.color + Math.floor(this.glow * 80).toString(16).padStart(2,'0'));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(this.x, this.y, r * 4, 0, Math.PI * 2); ctx.fill();
    }
    // Pulse ring
    if (this.pulse > 0.05) {
      ctx.strokeStyle = this.color + Math.floor(this.pulse * 120).toString(16).padStart(2,'0');
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(this.x, this.y, r + (1 - this.pulse) * 30, 0, Math.PI * 2); ctx.stroke();
    }
    // Body
    const bodyGrad = ctx.createRadialGradient(this.x - r*0.3, this.y - r*0.3, r*0.1, this.x, this.y, r);
    bodyGrad.addColorStop(0, this.color);
    bodyGrad.addColorStop(1, this.color + '88');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI * 2); ctx.fill();
    // Label
    ctx.fillStyle = 'rgba(148,163,184,' + (0.5 + this.glow * 0.5) + ')';
    ctx.font = '600 ' + (this.type === 'center' ? '11px' : '9px') + ' Inter';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, this.x, this.y + r + 14);
    if (this.label) {
      ctx.fillStyle = 'rgba(100,116,139,0.4)';
      ctx.font = '600 7px Inter';
      ctx.fillText(this.label, this.x, this.y + r + 24);
    }
  }
}

const particles = [];
class Particle {
  constructor(from, to, color, size = 3) {
    this.x = from.x; this.y = from.y;
    this.tx = to.x; this.ty = to.y;
    this.color = color; this.size = size;
    this.progress = 0; this.speed = 0.015 + Math.random() * 0.01;
    this.sx = from.x; this.sy = from.y;
    this.trail = [];
  }
  update() {
    this.progress += this.speed;
    const t = this.progress;
    const mt = 1 - t;
    // Curved path
    const cpx = (this.sx + this.tx) / 2 + (this.ty - this.sy) * 0.2;
    const cpy = (this.sy + this.ty) / 2 - (this.tx - this.sx) * 0.2;
    this.x = mt*mt*this.sx + 2*mt*t*cpx + t*t*this.tx;
    this.y = mt*mt*this.sy + 2*mt*t*cpy + t*t*this.ty;
    this.trail.push({ x:this.x, y:this.y });
    if (this.trail.length > 12) this.trail.shift();
    return this.progress >= 1;
  }
  draw(ctx) {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const alpha = (i / this.trail.length) * 0.4;
      ctx.fillStyle = this.color + Math.floor(alpha * 255).toString(16).padStart(2,'0');
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fill();
    }
    // Head
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function emitParticle(from, to, color, size) {
  particles.push(new Particle(from, to, color, size || 3));
}

// ═══════════════════════════════════════════
// CONNECTIONS
// ═══════════════════════════════════════════
function drawConnections(ctx) {
  allNodes.forEach(n => {
    if (n === centerNode) return;
    const alpha = 0.06 + n.glow * 0.15;
    ctx.strokeStyle = 'rgba(71,85,105,' + alpha + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(centerNode.x, centerNode.y);
    ctx.lineTo(n.x, n.y);
    ctx.stroke();
  });
}

// ═══════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════
const stars = Array.from({length: 120}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  size: Math.random() * 1.2 + 0.3,
  twinkle: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.02 + 0.005,
}));

function drawStars(ctx, time) {
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.2 + Math.sin(s.twinkle) * 0.15;
    ctx.fillStyle = `rgba(148,163,184,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ═══════════════════════════════════════════
// TIMELINE PLAYBACK
// ═══════════════════════════════════════════
let currentTime = T_START;
let eventIndex = 0;
let speed = 1;
let counters = { commits:0, bugs:0, releases:0, agents:0 };
let currentVersion = '';

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('#speedCtrl button').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === s);
  });
}

function formatDate(ts) {
  const d = new Date(ts);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${d.getDate().toString().padStart(2,'0')} ${months[d.getMonth()]}, ${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
}

function addFeedItem(html) {
  const feed = document.getElementById('feed');
  const item = document.createElement('div');
  item.className = 'feed-item';
  const time = formatDate(currentTime).split(', ').pop().split(' ').pop();
  item.innerHTML = `<span class="time">${time}</span>${html}`;
  feed.prepend(item);
  while (feed.children.length > 12) feed.lastChild.remove();
}

function findUserNode(name) {
  const first = name.split(' ')[0];
  return userNodes.find(n => n.name === first);
}
function findAiNode(name) {
  return aiNodes.find(n => n.name === name);
}

function processEvent(ev) {
  const d = ev.data;
  switch (ev.type) {
    case 'commit': {
      counters.commits++;
      const ai = findAiNode('Claude');
      if (ai) { ai.activate(0.8); emitParticle(ai, centerNode, '#c084fc', 4); }
      centerNode.activate(0.5);
      addFeedItem(`<span class="actor ai">Claude</span> <span class="action">committed</span> <span class="target">${d.msg}</span>`);
      break;
    }
    case 'release': {
      counters.releases++;
      currentVersion = d.v;
      const verEl = document.getElementById('version');
      verEl.textContent = d.v + ' RELEASED';
      verEl.classList.add('show');
      setTimeout(() => verEl.classList.remove('show'), 3000);
      document.getElementById('releaseFlash').style.opacity = '1';
      setTimeout(() => document.getElementById('releaseFlash').style.opacity = '0', 600);
      centerNode.activate(1);
      allNodes.forEach(n => n.activate(0.3));
      addFeedItem(`<span class="actor system">System</span> <span class="action">deployed</span> <span class="target">${d.v}</span> <span class="action">(${d.fixes} fixes)</span>`);
      break;
    }
    case 'bug': {
      counters.bugs++;
      const reporter = findUserNode(d.reporter);
      const fixer = findAiNode(d.fixer) || findAiNode('Claude');
      if (reporter) { reporter.activate(0.7); emitParticle(reporter, centerNode, '#f87171', 3); }
      if (fixer) { fixer.activate(0.5); emitParticle(centerNode, fixer, '#4ade80', 3); }
      addFeedItem(`<span class="actor user">${d.reporter}</span> <span class="action">reported</span> <span class="target">${d.key}</span> <span class="action">→ fixed by</span> <span class="actor ai">${d.fixer}</span>`);
      break;
    }
    case 'user_action': {
      const un = findUserNode(d.user);
      if (un) { un.activate(0.4); emitParticle(un, centerNode, un.color || '#38bdf8', 2); }
      addFeedItem(`<span class="actor user">${d.user}</span> <span class="action">${d.action}</span>`);
      break;
    }
    case 'ai_action': {
      counters.agents++;
      const an = findAiNode(d.agent);
      if (an) { an.activate(0.6); emitParticle(an, centerNode, an.color || '#a78bfa', 3); }
      addFeedItem(`<span class="actor ai">${d.agent}</span> <span class="action">${d.action}</span>`);
      break;
    }
  }
  document.getElementById('sCommits').textContent = counters.commits;
  document.getElementById('sBugs').textContent = counters.bugs;
  document.getElementById('sReleases').textContent = counters.releases;
  document.getElementById('sAgents').textContent = counters.agents;
}

// ═══════════════════════════════════════════
// HISTOGRAM — Activity density on timeline
// ═══════════════════════════════════════════
const NUM_BINS = 80;
const histBins = Array.from({length: NUM_BINS}, () => ({ commits:0, bugs:0, releases:0, total:0 }));
ALL_EVENTS.forEach(ev => {
  const pct = (ev.t - T_START) / T_SPAN;
  const bin = Math.min(NUM_BINS - 1, Math.max(0, Math.floor(pct * NUM_BINS)));
  histBins[bin].total++;
  if (ev.type === 'commit') histBins[bin].commits++;
  else if (ev.type === 'bug') histBins[bin].bugs++;
  else if (ev.type === 'release') histBins[bin].releases++;
});
const maxBin = Math.max(1, ...histBins.map(b => b.total));

function renderHistogram() {
  const container = document.getElementById('histogram');
  container.innerHTML = histBins.map((bin, i) => {
    const totalH = (bin.total / maxBin * 34);
    const commitH = (bin.commits / maxBin * 34);
    const bugH = (bin.bugs / maxBin * 34);
    const releaseH = (bin.releases / maxBin * 34);
    const otherH = totalH - commitH - bugH - releaseH;
    let bottom = 0;
    let parts = '';
    if (otherH > 0) { parts += `<div style="position:absolute;bottom:${bottom}px;width:100%;height:${otherH}px;background:rgba(148,163,184,0.3);border-radius:1px;"></div>`; bottom += otherH; }
    if (commitH > 0) { parts += `<div style="position:absolute;bottom:${bottom}px;width:100%;height:${commitH}px;background:rgba(56,189,248,0.7);border-radius:1px;"></div>`; bottom += commitH; }
    if (bugH > 0) { parts += `<div style="position:absolute;bottom:${bottom}px;width:100%;height:${bugH}px;background:rgba(248,113,113,0.8);border-radius:1px;"></div>`; bottom += bugH; }
    if (releaseH > 0) { parts += `<div style="position:absolute;bottom:${bottom}px;width:100%;height:${releaseH}px;background:rgba(16,185,129,0.9);border-radius:1px;"></div>`; bottom += releaseH; }
    return `<div class="hist-bar" style="height:${totalH}px;position:relative;">${parts}</div>`;
  }).join('');
}
renderHistogram();

function timelineClick(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  currentTime = T_START + pct * T_SPAN;
  // Reset event index — find the right position
  eventIndex = 0;
  counters = { commits:0, bugs:0, releases:0, agents:0 };
  // Replay counters up to the new position
  while (eventIndex < ALL_EVENTS.length && ALL_EVENTS[eventIndex].t <= currentTime) {
    const ev = ALL_EVENTS[eventIndex];
    if (ev.type === 'commit') counters.commits++;
    else if (ev.type === 'bug') counters.bugs++;
    else if (ev.type === 'release') { counters.releases++; currentVersion = ev.data.v; }
    else if (ev.type === 'ai_action') counters.agents++;
    eventIndex++;
  }
  document.getElementById('sCommits').textContent = counters.commits;
  document.getElementById('sBugs').textContent = counters.bugs;
  document.getElementById('sReleases').textContent = counters.releases;
  document.getElementById('sAgents').textContent = counters.agents;
  // Clear feed
  document.getElementById('feed').innerHTML = '';
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
let lastFrame = 0;
const TIME_SCALE = 120000; // 1 real second = 2 minutes of simulated time

function frame(now) {
  const dt = lastFrame ? (now - lastFrame) / 1000 : 0;
  lastFrame = now;

  // Advance time
  currentTime += dt * TIME_SCALE * speed;
  if (currentTime > T_END + 60000) { currentTime = T_START; eventIndex = 0; counters = {commits:0,bugs:0,releases:0,agents:0}; }

  // Process events
  while (eventIndex < ALL_EVENTS.length && ALL_EVENTS[eventIndex].t <= currentTime) {
    processEvent(ALL_EVENTS[eventIndex]);
    eventIndex++;
  }

  // Update clock & timeline
  const pctDone = (currentTime - T_START) / T_SPAN * 100;
  document.getElementById('clock').textContent = formatDate(currentTime);
  document.getElementById('progressFill').style.width = pctDone + '%';
  document.getElementById('timelinePlayhead').style.left = pctDone + '%';

  // Clear
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // Background gradient
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.7);
  bgGrad.addColorStop(0, 'rgba(15,23,42,1)');
  bgGrad.addColorStop(1, 'rgba(2,6,23,1)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // Stars
  drawStars(ctx, now);

  // Gentle orbit
  const time = now * 0.0003;
  userNodes.forEach((n, i) => {
    const angle = (i / TEAM.length) * Math.PI * 2 - Math.PI / 2 + Math.sin(time + i) * 0.08;
    const dist = 180 + Math.sin(time * 0.7 + i * 2) * 15;
    n.tx = cx + Math.cos(angle) * dist;
    n.ty = cy + Math.sin(angle) * dist;
  });
  aiNodes.forEach((n, i) => {
    const angle = (i / AI_AGENTS.length) * Math.PI * 2 - Math.PI / 4 + Math.sin(time * 1.2 + i) * 0.1;
    const dist = 110 + Math.sin(time * 0.9 + i * 3) * 10;
    n.tx = cx + Math.cos(angle) * dist;
    n.ty = cy + Math.sin(angle) * dist;
  });
  centerNode.tx = cx;
  centerNode.ty = cy;

  // Draw
  drawConnections(ctx);
  allNodes.forEach(n => { n.update(); n.draw(ctx); });

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const done = particles[i].update();
    particles[i].draw(ctx);
    if (done) particles.splice(i, 1);
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
